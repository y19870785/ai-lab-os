name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[local]"
      - name: Run Ruff on changed Python files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$(git merge-base "$HEAD_SHA" origin/main)"
          fi

          mapfile -d '' python_files < <(
            git diff --name-only --diff-filter=ACMR -z \
              "$BASE_SHA" "$HEAD_SHA" -- '*.py'
          )

          if (( ${#python_files[@]} == 0 )); then
            echo "No changed Python files to lint."
            exit 0
          fi

          printf 'Ruff checking: %s\n' "${python_files[@]}"
          python -m ruff check -- "${python_files[@]}"

  pytest:
    name: pytest (non-real)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[local]"
      - name: Verify real-test collection isolation
        env:
          OPENAI_API_KEY: ""
          AI_LAB_LLM_API_KEY: ""
        run: python -m pytest tests/core/test_version.py tests/real -q --tb=no
      - name: Run non-real tests
        run: python -m pytest tests --ignore=tests/real -m "not real" -q --tb=no
