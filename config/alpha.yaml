# AI-Lab Alpha 环境配置
app:
  name: "AI-Lab"
  version: "0.31.0"
  debug: false

providers:
  llm:
    default: openai
    openai:
      model: "${OPENAI_MODEL:-gpt-4o-mini}"
      timeout: 60
      max_retries: 3
  embedding:
    default: openai
    openai:
      model: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}"
  vector:
    default: chroma
    chroma:
      persist_dir: "${CHROMA_PERSIST_DIR:-data/chroma}"
      collection: "${CHROMA_COLLECTION:-ai_lab_knowledge}"

memory:
  enabled: true
  default_session_ttl: 7200
  consolidation:
    schedule: "hourly"

knowledge:
  enabled: true
  default_chunk_size: 512
  default_top_k: 10
  enable_hybrid_search: true

agent:
  max_concurrent: 5
  default_timeout: 120

workflow:
  max_retries: 3

scheduler:
  tick_interval_ms: 100
  max_concurrent_jobs: 10

api:
  host: "0.0.0.0"
  port: 8000
