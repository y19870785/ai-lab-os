# AI-Lab 生产环境配置示例
# 复制为 production.yaml 并填写真实值
# 不要将 production.yaml 提交到 Git！

app:
  name: "AI-Lab"
  version: "0.31.0"
  debug: false

providers:
  llm:
    default: openai
    openai:
      api_key: "${OPENAI_API_KEY}"
      base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      model: "${OPENAI_MODEL:-gpt-4o}"
      timeout: 120
      max_retries: 3
  embedding:
    default: openai
    openai:
      model: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}"
  vector:
    default: chroma
    chroma:
      persist_dir: /app/data/chroma
      collection: ai_lab_production

memory:
  default_session_ttl: 7200

agent:
  max_concurrent: 10
  default_timeout: 180

api:
  host: "0.0.0.0"
  port: 8000
